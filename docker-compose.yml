services:
  scenema-audio:
    build: .
    ports:
      - "8000:8000"
    environment:
      - HF_TOKEN=${HF_TOKEN}
      - GEMMA_QUANTIZE=
      - ENABLE_GRADIO=1
      - AUDIO_CKPT=/app/models/scenema-audio-transformer-int8.safetensors
      - VAE_ENCODER_CKPT=/app/models/scenema-audio-vae-encoder.safetensors
      - PIPELINE_CKPT=/app/models/scenema-audio-pipeline.safetensors
      - GEMMA_ROOT=/app/models/gemma-3-12b-it
      - MELBAND_MODEL_PATH=/app/models/MelBandRoformer_fp16.safetensors
      - SEEDVC_PATH=/app/seed-vc
      - MODEL_DIR=/app/models
      - PORT=8000
      # --- Podcast feature ---
      # PUBLIC_BASE_URL is Gigatron's Tailscale address (MagicDNS name or 100.x.x.x),
      # used to build the absolute audio_url that Hermes pulls over the tailnet.
      - PUBLIC_BASE_URL=${PUBLIC_BASE_URL:-http://localhost:8000}
      - PODCAST_DATA_DIR=/app/data
      - MP3_BITRATE=128k
      - TURN_GAP_S=0.4
      - MAX_VOICE_CLIP_MB=25
      - MAX_PODCAST_TURNS=500
      - PODCAST_TTL_DAYS=7
    volumes:
      - model-cache:/app/models
      - seedvc-cache:/app/seed-vc
      - podcast-data:/app/data
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  model-cache:
  seedvc-cache:
  podcast-data:
